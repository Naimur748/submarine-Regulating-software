function toBanglaNumber(num) {
    const bn = ['০','১','২','৩','৪','৫','৬','৭','৮','৯'];
    return num.toString().split('').map(d => bn[d] || d).join('');
}

function setTodayDate() {
    const today = new Date();

    let day = toBanglaNumber(today.getDate().toString().padStart(2, '0'));
    let month = toBanglaNumber((today.getMonth() + 1).toString().padStart(2, '0'));
    let year = toBanglaNumber(today.getFullYear());

    document.getElementById("todayDate").innerText = `${day}-${month}-${year}`;
}

function saveData() {
            var input1Value = document.getElementById("input1").value;
            var input2Value = document.getElementById("input2").value;
            var input3Value = document.getElementById("input3").value;
            
            var input4Value = document.getElementById("gxtime").value;
            var input5Value = document.getElementById("gxdate").value;
            var input6Value = document.getElementById("gxtext").value;

            // Retrieve existing table data from local storage
            var existingTableData = JSON.parse(localStorage.getItem("gxData")) || [];

            // Add new row data to the beginning of the array
            existingTableData.unshift({
                gxNo: input1Value,
                gxDate: input2Value,
                onr: input3Value,
                gxtime: input4Value,
                wefdate: input5Value,
                gxtext: input6Value
            });

            // Save the updated array back to local storage
            localStorage.setItem("gxData", JSON.stringify(existingTableData));     


        closePopup()

        }



        
        
function formatGXText(text) {
    if (!text) return "";

    // ০২। ০৩। … ০৮। এর আগে newline add করা
    // এক বা দুই অঙ্কের serial numbers
    text = text.replace(/\s*(০[২-৯]|১০)।/g, '\n$&');

    // অতিরিক্ত space clean করা
    text = text.replace(/\s+\n/g, '\n').trim();

    return text;
}

// EDIT BUTTON CLICK
function editButtonClick(index) {

    document.getElementById("saveChangesButton").style.display = "block";

    var userData = JSON.parse(localStorage.getItem("gxData")) || [];

    if (userData[index]) {

        document.getElementById("input1").value = userData[index].gxNo;
        document.getElementById("input2").value = userData[index].gxDate;
        document.getElementById("input3").value = userData[index].onr;
        document.getElementById("gxtime").value = userData[index].gxtime;
        document.getElementById("gxdate").value = userData[index].wefdate;
        document.getElementById("gxtext").value = userData[index].gxtext;

        document.getElementById("editModal").style.display = "block";

        document.getElementById("saveChangesButton").onclick = function () {
            saveChanges(index);
        };

    } else {
        alert("Data not found at index " + index);
    }
}

function deleteItem(index) {
    let confirmDelete = confirm("⚠️ আপনি কি নিশ্চিতভাবে এই আইটেমটি ডিলিট করতে চান?");

    // যদি user OK চাপায়
    if (confirmDelete) {
        let userData = JSON.parse(localStorage.getItem("gxData")) || [];

        // remove item
        userData.splice(index, 1);

        // update localStorage
        localStorage.setItem("gxData", JSON.stringify(userData));

        // re-render UI
        displayData();

        alert("✅ আইটেম সফলভাবে ডিলিট হয়েছে!");
    } else {
        // Cancel করলে কিছুই হবে না
        alert("❌ ডিলিট বাতিল করা হয়েছে");
    }
}




// Function to save changes
function saveChanges(index) {
    // Retrieve all data from local storage
    var userData = JSON.parse(localStorage.getItem("gxData")) || [];

    // If there is data at the specified index
    if (userData[index]) {
        // Update data with new values from the modal
        userData[index].gxNo = document.getElementById("input1").value;
        userData[index].gxDate = document.getElementById("input2").value;
        userData[index].onr = document.getElementById("input3").value;
        userData[index].gxtime = document.getElementById("gxtime").value;
        userData[index].wefdate = document.getElementById("gxdate").value;
        userData[index].gxtext = document.getElementById("gxtext").value;

        // Save the updated data back to local storage
        localStorage.setItem("gxData", JSON.stringify(userData));

        // Close the modal
        document.getElementById("editModal").style.display = "none";

        // Update the displayed data
        displayData();
    } else {
        alert("Data not found at index " + index);
    }
}

    while (gxLines.length < 10) gxLines.push("");

    const sailorInfo = d.onr || "";
    let singleSailorNumber = "";
    let singleRank = "";
    let sixSailorNo = "";

    const sailorLines = sailorInfo
        .split("\n")
        .map(line => line.trim())
        .filter(line => line !== "");

    const sailorCount = sailorLines.length;

    const isSingle = sailorCount === 1;
    const isOverflow = sailorCount > 6;

    if (isSingle) {
        const [govNumber, ...rest] = sailorLines[0].split(" ");
        const nameParts = rest.filter(p => /^[\u0980-\u09FF]+$/.test(p));
        const rankParts = rest.filter(p => /^[a-zA-Z0-9-]+$/.test(p));

        singleSailorNumber = govNumber || "";
        sixSailorNo = nameParts.join(" ");
        singleRank = rankParts.join(" ");
    } 
    else if (!isOverflow) {
        sixSailorNo = sailorLines
            .map((line, i) => `${i + 1}. ${line}`)
            .join("<br>");
    } 
    else {
        sixSailorNo = '<div style="text-align:center; font-weight:bold;font-size:30px">অঃ পৃঃ দ্রঃ</div>';
    }

    const totalGX = gxLines.length;
    const signatureStartIndex = totalGX - 6;

    let gxRowsHTML = "";

    gxLines.forEach((line, i) => {

        if (i === 0) {
            gxRowsHTML += `
            <tr>
                <td colspan="2">${line}</td>
                <td style="text-align:center; border-right:none;">
                    ${d.wefdate || ""}
                </td>
            </tr>`;
        }

        else if (i === signatureStartIndex) {
            gxRowsHTML += `
            <tr>
                <td colspan="2">${line}</td>

                <td rowspan="6"
                    style="border:none; vertical-align:top; padding:10px;">

                    <div style="text-align:left;">
                        কমান্ডিং অফিসার<br>
                        পক্ষে
                    </div>

                    <div style="
                        text-align:left;
                        margin-top:10px;
                        padding-left:80px;
                        line-height:1.4;
                        white-space:nowrap;
                        word-break:normal;
                        overflow-wrap:normal;
                        font-family:Arial, sans-serif;
                    ">
                        আজিজ মুহাম্মদ ইমতিয়াজ<br>
                        লেঃ কমান্ডার বিএন<br>
                        রেগুলেটিং কর্মকর্তা<br>
                        বানৌজা পেকুয়া
                    </div>

                </td>
            </tr>`;
        }

        else {
            gxRowsHTML += `
            <tr>
                <td colspan="2">${line}</td>
            </tr>`;
        }
    });


/* 🔥 SECOND PAGE (4 COLUMN VERSION – ALL DATA IN ONE PAGE) */

let secondPageHTML = "";

if (sailorCount > 6) {

    const total = sailorLines.length;
    const colCount = 4; // 🔥 এখানে ৩ এর জায়গায় ৪

    const perCol = Math.ceil(total / colCount);

    const col1 = sailorLines.slice(0, perCol);
    const col2 = sailorLines.slice(perCol, perCol * 2);
    const col3 = sailorLines.slice(perCol * 2, perCol * 3);
    const col4 = sailorLines.slice(perCol * 3, perCol * 4);

    const formatColumn = (arr, start) => {
        return arr.map((line, i) => `${start + i + 1}. ${line}`).join("<br>");
    };

    let fontSize = "12px";
    let lineHeight = "1.6";

    if (total > 80) {
        fontSize = "12px";
        lineHeight = "1.4";
    }
    if (total > 150) {
        fontSize = "12px";
        lineHeight = "1.3";
    }
    if (total > 250) {
        fontSize = "12px";
        lineHeight = "1.2";
    }

    secondPageHTML = `
    <div style="page-break-before: always;"></div>

    <div class="tableArea">
        <h3 style="text-align:center;">দ্রষ্টব্য</h3>

        <table>
            <tr>

                <td style="width:25%; vertical-align:top; padding:5px; font-size:${fontSize}; line-height:${lineHeight};">
                    ${formatColumn(col1, 0)}
                </td>

                <td style="width:25%; vertical-align:top; padding:5px; font-size:${fontSize}; line-height:${lineHeight};">
                    ${formatColumn(col2, perCol)}
                </td>

                <td style="width:25%; vertical-align:top; padding:5px; font-size:${fontSize}; line-height:${lineHeight};">
                    ${formatColumn(col3, perCol * 2)}
                </td>

                <td style="width:25%; vertical-align:top; padding:5px; font-size:${fontSize}; line-height:${lineHeight};">
                    ${formatColumn(col4, perCol * 3)}
                </td>

            </tr>
        </table>
    </div>
    `;
}

    /* 🔥 BOTTOM NOTE */
    const bottomNoteHTML = `
    <div style="margin-top:10px;font-size:10px;font-family:Arial;">

    <div style="display:flex;justify-content:space-between;gap:20px;">

        <div style="width:60%; text-align:left; line-height:2; margin-left: 20px;">
            * অপ্রয়োজনীয় অংশ কাটিতে হইবে।<br>
            অফিসারের জন্য অ উপসর্গ ব্যবহার করিতে হইবে এবং নাবিকের জন্য নৌ উপসর্গ ব্যবহার করিতে হইবে।<br>
            ১প কপি সামরিক হিসাব নিয়ন্ত্রকের নিকট পাঠাইতে হইবে।<br>
            ২য় কপি (ক) অফিসারের জন্য নৌ সদর দপ্তরে পাঠাইতে হইবে।<br>
            &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;(খ) নাবিকের জন্য নৌ বদলি কর্তৃপক্ষের নিকট পাঠাইতে হইবে।<br>
        </div>

        <div style="width:40%; text-align:left; line-height:2;">
            ৩য় কপি একক হিসাব রক্ষকের নিকট পাঠাইতে হইবে।<br>
            ৪র্থ কপি সংশ্লিষ্ট ব্যক্তিকে প্রদান করিতে হইবে।<br>
            ৫ম কপি খাদ্যদ্রব্য হিসেবে অনুকূলে যাইবে।<br>
            ৬ষ্ঠ কপি জাহাজের কপি হিসেবে রাখিতে হইবে।<br>
        </div>

    </div>

    <div style="text-align:left; margin-top:8px;">
        বিএনসিপিপি-২৯২ (এস)
    </div>

    </div>
    `;

    const printWindow = window.open('', '_blank');

    printWindow.document.write(`

    printWindow.focus();
    printWindow.onload = () => printWindow.print();
