function openPopup() {
    // Display the modal
    document.getElementById("editModal").style.display = "block";
    document.getElementById("saveButton").style.display = "block";


    // Clear existing values in the popup fields
    document.getElementById("input1").value = '';
    document.getElementById("input2").value = '';
    document.getElementById("input3").value = '';
    document.getElementById("gxtime").value = '';
    document.getElementById("gxdate").value = '';
    document.getElementById("gxtext").value = '';

    // Save changes when the "Save" button in the modal is clicked

        saveData();

    };
}

function saveData() {
            var input1Value = document.getElementById("input1").value;
            var input2Value = document.getElementById("input2").value;
            var input3Value = document.getElementById("input3").value;
            
            var input4Value = document.getElementById("gxtime").value;
            var input5Value = document.getElementById("gxdate").value;
            var input6Value = document.getElementById("gxtext").value;

            // Retrieve existing table data from local storage
            var existingTableData = JSON.parse(localStorage.getItem("gxData")) || [];

            // Add new row data to the beginning of the array
            existingTableData.unshift({
                gxNo: input1Value,
                gxDate: input2Value,
                onr: input3Value,
                gxtime: input4Value,
                wefdate: input5Value,
                gxtext: input6Value
            });

            // Save the updated array back to local storage
            localStorage.setItem("gxData", JSON.stringify(existingTableData));     


        closePopup()

            // Display the saved data
            displayData();
            
        }



        
        
function formatGXText(text) {
    if (!text) return "";

    // ০২। ০৩। … ০৮। এর আগে newline add করা
    // এক বা দুই অঙ্কের serial numbers
    text = text.replace(/\s*(০[২-৯]|১০)।/g, '\n$&');

    // অতিরিক্ত space clean করা
    text = text.replace(/\s+\n/g, '\n').trim();

    return text;
}

// Function to handle edit button click
function editButtonClick(index) {

    document.getElementById("saveChangesButton").style.display = "block";
    // Retrieve all data from local storage
    var userData = JSON.parse(localStorage.getItem("gxData")) || [];

    // If there is data at the specified index
    if (userData[index]) {
        // Populate form fields with values for editing
        document.getElementById("input1").value = userData[index].gxNo;
        document.getElementById("input2").value = userData[index].gxDate;
        document.getElementById("input3").value = userData[index].onr;
        document.getElementById("gxtime").value = userData[index].gxtime;
        document.getElementById("gxdate").value = userData[index].wefdate;
        document.getElementById("gxtext").value = userData[index].gxtext;

        // Display the modal
        document.getElementById("editModal").style.display = "block";

        // Save changes when the "Save Changes" button in the modal is clicked
        document.getElementById("saveChangesButton").onclick = function () {
            saveChanges(index);
        };
    } else {
        alert("Data not found at index " + index);
    }

    
    document.getElementById("close").onclick = function () {
     document.getElementById("editModal").style.display = "none";
   
};
}



// Function to save changes
function saveChanges(index) {
    // Retrieve all data from local storage
    var userData = JSON.parse(localStorage.getItem("gxData")) || [];

    // If there is data at the specified index
    if (userData[index]) {
        // Update data with new values from the modal
        userData[index].gxNo = document.getElementById("input1").value;
        userData[index].gxDate = document.getElementById("input2").value;
        userData[index].onr = document.getElementById("input3").value;
        userData[index].gxtime = document.getElementById("gxtime").value;
        userData[index].wefdate = document.getElementById("gxdate").value;
        userData[index].gxtext = document.getElementById("gxtext").value;

        // Save the updated data back to local storage
        localStorage.setItem("gxData", JSON.stringify(userData));

        // Close the modal
        document.getElementById("editModal").style.display = "none";

        // Update the displayed data
        displayData();
    } else {
        alert("Data not found at index " + index);
    }
}

function searchObjects() {
    var searchInput = document.getElementById('searchInput').value.toLowerCase();
    var mainContainer = document.querySelector('.main');

    // Clear previous search results
    mainContainer.innerHTML = '';

    // Retrieve data from local storage
    var storedData = JSON.parse(localStorage.getItem('gxData')) || [];

    // Filter objects based on any property and limit to elements inside the 'main' class
    var searchResults = storedData.filter(function (obj) {
        for (var key in obj) {
            if (obj.hasOwnProperty(key)) {
                // Check if the property value includes the search input
                if (obj[key].toString().toLowerCase().includes(searchInput)) {
                    return true;
                }
            }
        }
        return false;
    });

    // Display search results
    searchResults.forEach(function (result) {
        var itemsContainer = document.createElement('div');
        itemsContainer.classList.add('items');

        itemsContainer.innerHTML = `
            <span onclick='editButtonClick(${searchResults.indexOf(result)})' class='editb'>&#x270E;</span>
            <div class="gxContainer"> 
                <div>${result.gxNo}</div>
                <div>${result.gxDate}</div>
            </div>
            <textarea>${result.onr}</textarea>
            <div class="wefContainer">  
                <div>${result.wefdate}</div>
                <div>${result.gxtime}</div>
            </div>
            <textarea>${result.gxtext}</textarea>
        `;

        mainContainer.appendChild(itemsContainer);
    });
}

 document.getElementById("printContainer").addEventListener("click", function () {
    const gxNumber = document.getElementById("input1").value.trim();
    const gxDate = document.getElementById("input2").value.trim();
    const sailorInfo = document.getElementById("input3").value.trim();
    const wefDate = document.getElementById("gxdate").value.trim();
    const reportTime = document.getElementById("gxtime").value.trim();
    const gxText = document.getElementById("gxtext").value.trim();

    // gxNumber-এর ভ্যালু "সাধারণ তথ্যের ক্রমিক নং" এর সাথে যুক্ত করা
    const existingText = "সাধারণ তথ্যের নৌ নং /";
    const updatedText = `${existingText}: ${gxNumber || "N/A"}`;
    document.getElementById("gx_number").textContent = updatedText;

    // অন্যান্য তথ্য প্রদর্শন
    document.getElementById("gx_date").textContent = gxDate || "N/A";
    document.getElementById("wef_date").textContent = wefDate || "N/A";
    document.getElementById("am_pm").textContent = reportTime || "N/A";

    // সেলরদের তথ্য প্রসেস করা
    const sailorLines = sailorInfo.split("\n").map(line => line.trim()).filter(line => line !== "");

    if (sailorLines.length === 1) {
        // একক সেলরের তথ্য প্রসেস করা
        const [govNumber, ...rest] = sailorLines[0].split(" ").map(item => item.trim());
        const nameParts = rest.filter(part => /^[\u0980-\u09FF]+$/.test(part)); // বাংলা অংশ
        const rankParts = rest.filter(part => /^[a-zA-Z0-9-]+$/.test(part)); // ইংরেজি অংশ

        const name = nameParts.join(" ");
        const rank = rankParts.join(" ");
        const rankWithDesignation = `পদবীঃ ${rank || "N/A"}`; // পদবী যুক্ত করা

        document.getElementById("singleSailor_Number").textContent = govNumber || "N/A";
        document.getElementById("six_sailor_No").textContent = name || "N/A";
        document.getElementById("single_rank").textContent = rankWithDesignation; // আপডেটেড রাঙ্ক
    } else if (sailorLines.length <= 6) {
        // একাধিক সেলরের তথ্য প্রসেস করা
        const formattedSailors = sailorLines.map((line, index) => {
            const parts = line.split(" ").map(item => item.trim());
            const govNumber = parts[0];
            const name = parts[1] + " " + parts[2]; // নাম
            const rank = parts.slice(3).join(" "); // পদবী
            const rankWithDesignation = `পদবীঃ ${rank || "N/A"}`; // পদবী যুক্ত করা

            return `${index + 1}. ${govNumber} ${name} ${rankWithDesignation}`; // ফরম্যাট
        }).join("<br>");

        document.getElementById("six_sailor_No").innerHTML = formattedSailors;
        document.getElementById("singleSailor_Number").textContent = "";
        document.getElementById("single_rank").textContent = "";
    }

    // gxText এর লাইন প্রসেস করা
    const gxLines = gxText.split("\n").map(line => line.trim()).filter(line => line !== "");
    const lineIds = [
        "gx_textArea_firstLine",
        "gx_textArea_secondLine",
        "gx_textArea_thirdLine",
        "gx_textArea_forthLine",
        "gx_textArea_fifthLine",
    ];
    lineIds.forEach((id, index) => {
        document.getElementById(id).textContent = gxLines[index] || "";
    });







    // প্রিন্ট টেবিল দেখানো এবং প্রিন্ট করা
    // 🔹 মূল টেবিল দেখানো

originalTable.style.display = "block";

// 🔹 clone তৈরি (দ্বিতীয় কপি)
const cloneTable = originalTable.cloneNode(true);
cloneTable.id = "printTableClone";
cloneTable.style.marginTop = "20px";

// 🔹 Print container না থাকলে বানাও
let container = document.getElementById("printContainer");
if (!container) {
    container = document.createElement("div");
    container.id = "printContainer";
    document.body.appendChild(container);
}

// 🔹 আগের কিছু থাকলে ক্লিয়ার
container.innerHTML = "";

// 🔹 উপরে original, নিচে clone
container.appendChild(originalTable);
container.appendChild(cloneTable);

// 🔹 প্রিন্ট
setTimeout(() => {

    // 🔹 প্রিন্ট শেষে cleanup

    cloneTable.remove();
    originalTable.style.display = "none";
}, 300);

function printContainer(index) {
    const gxData = JSON.parse(localStorage.getItem('gxData')) || [];

    if (index < 0 || index >= gxData.length) {
        alert("Invalid index");
        return;
    }

    const d = gxData[index];

    const gxText = d.gxtext || "";
    const gxLines = gxText
        .split("\n")
        .map(line => line.trim())
        .filter(line => line !== "");

    while (gxLines.length < 10) gxLines.push("");

    const sailorInfo = d.onr || "";
    let singleSailorNumber = "";
    let singleRank = "";
    let sixSailorNo = "";

    const sailorLines = sailorInfo
        .split("\n")
        .map(line => line.trim())
        .filter(line => line !== "");

    const sailorCount = sailorLines.length;

    const isSingle = sailorCount === 1;
    const isOverflow = sailorCount > 6;

    if (isSingle) {
        const [govNumber, ...rest] = sailorLines[0].split(" ");
        const nameParts = rest.filter(p => /^[\u0980-\u09FF]+$/.test(p));
        const rankParts = rest.filter(p => /^[a-zA-Z0-9-]+$/.test(p));

        singleSailorNumber = govNumber || "";
        sixSailorNo = nameParts.join(" ");
        singleRank = rankParts.join(" ");
    } 
    else if (!isOverflow) {
        sixSailorNo = sailorLines
            .map((line, i) => `${i + 1}. ${line}`)
            .join("<br>");
    } 
    else {
        sixSailorNo = '<div style="text-align:center; font-weight:bold;">অঃ পৃঃ দ্রঃ</div>';
    }

    const totalGX = gxLines.length;
    const signatureStartIndex = totalGX - 6;

    let gxRowsHTML = "";

    gxLines.forEach((line, i) => {

        if (i === 0) {
