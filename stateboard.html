<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Naval Strength Table</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.1.1/chart.min.js"></script>

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background: #f0f2f5;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }

  .top-bar {
    width: 60%;
    max-width: 1200px;
    display: flex;
    justify-content: space-between;
    margin-bottom: 14px;

  }

  .print-btn {
    padding: 7px 22px;
    background: #1a3a5c;
    color: #fff;
    border: none;
    border-radius: 4px;
    cursor: pointer;
  }

  .header {
  width: 100%;
  max-width: 1000px;
  text-align: center;
  padding: 15px 10px;
  margin-bottom: 15px;
  border-radius: 10px;

  /* Navy Gradient Background */
  background: linear-gradient(135deg, #1a3a5c, #2c5282);

  /* Soft Shadow */
  box-shadow: 0 4px 15px rgba(0,0,0,0.2);

  /* Smooth Animation */
  transition: all 0.3s ease;
}

/* Hover Effect */
.header:hover {
  transform: scale(1.02);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

/* LIVE STATE */
.header h2 {
  font-size: 20px;
  color: #ffd700; /* Gold */
  letter-spacing: 2px;
  margin-bottom: 4px;
}

/* BANGLADESH NAVY */
.header h3 {
  font-size: 14px;
  color: #ffffff;
  margin-bottom: 3px;
}

/* BNS PEKUA */
.header h4 {
  font-size: 13px;
  color: #dbeafe;
  margin-bottom: 5px;
  
}

/* DATE */
.header p {
  font-size: 12px;
  color: #e2e8f0;
  font-weight: bold;
  letter-spacing: 1px;
}

/* Optional Glow Effect */
.header h2, .header h3 {
  text-shadow: 0 0 5px rgba(255,255,255,0.3);
}

  /* ================= CHART ================= */

  .chart-container {
    display: flex;
    gap: 15px;
    width: 65%;
    max-width: 1200px;
    margin-bottom: 15px;
  }

  .chart-box {
    width: 50%;
    background: #fff;
    padding: 10px;
    border-radius: 6px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    text-align: center;
  }

  canvas {
    width: 100% !important;
    height: 250px !important;
  }

  /* ================= TABLE ================= */

  .card {
    background: #fff;
    border-radius: 8px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.10);
    padding: 18px 14px;
    width: 100%;
    max-width: 1000px;
  }

  table {
    border-collapse: collapse;
    width: 100%;
    table-layout: fixed;
    font-size: 10px;
  }

  th, td {
    border: 1px solid #555;
    padding: 3px 4px;
    white-space: nowrap;
  }

  thead th {
    background: #1a3a5c;
    color: #fff;
    font-size: 10px;
  }

  td.label {
    text-align: left;
    padding-left: 6px;
  }

  td.div-label {
    text-align: center;
    background: #c6d4e8;
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    font-weight: bold;
  }

  td.num {
    text-align: center;
  }

  td input {
    width: 100%;
    border: none;
    background: transparent;
    text-align: center;
  }

  table th:nth-child(2),
table td.label {
  width: 125px;
  min-width: 125px;
  max-width: 125px;
}



@media print {

  * {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    background: #fff;
    margin: 0;
    padding: 0;

    /* 🔥 MAIN SCALE CONTROL */
    transform: scale(1);   /* 👉 0.60–0.70 adjust করতে পারো */
    transform-origin: top left;
  }

  .top-bar {
    display: none;
  }

  /* সব section compact */
  .header {
    margin-bottom: 3px;
    padding: 6px;
  }

  .header h2 { font-size: 12px; }
  .header h3 { font-size: 10px; }
  .header h4 { font-size: 9px; }
  .header p  { font-size: 8px; }

  .chart-container {
    margin-bottom: 5px;
    gap: 5px;
  }

  .chart-box {
    padding: 5px;
  }

  /* 🔥 chart ছোট */
  canvas {
    width: 100% !important;
    height: 120px !important;
  }

  .card {
    padding: 5px;
    overflow: visible !important;
  }

  /* 🔥 table compact */
  table {
    width: 100% !important;
    table-layout: fixed;
    font-size: 6px;
  }

  th, td {
    padding: 1px 2px;
  }

  /* 🔥 department column small */
  table th:nth-child(2),
  table td.label {
    width: 60px;
    max-width: 60px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* page break বন্ধ */
  .header,
  .chart-container,
  .card,
  table,
  tr {
    page-break-inside: avoid;
  }

  /* margin control */
  @page {
    margin: 5mm;
  }

}

</style>

<special-header></special-header>
    <script src="./headerfotermanager.js"></script>

</head>


<body>

  

<div class="header">
  <h2>LIVE STATE</h2>
  <h3>BANGLADESH NAVY</h3>
  <h4>B.N.S PEKUA</h4>
  <p id="date">DATE:</p>
</div>



<!-- HEADER -->
<div class="top-bar">
  <h2>NAVAL STRENGTH</h2>
  <button class="print-btn" onclick="window.print()">PRINT</button>
</div>

<!-- ================= CHART SECTION ================= -->
<div class="chart-container">

  <div class="chart-box">
    <h4>COMSUB SHIPS COMPANY RECORD</h4>
    <canvas id="myChart"></canvas>
  </div>

  <div class="chart-box">
    <h4>PEKUA SHIPS COMPANY RECORD</h4>
    <canvas id="chartId"></canvas>
  </div>

</div>

<!-- ================= TABLE ================= -->
<div class="card">
<table id="mainTable">
<thead>
  <tr>
    <th>DIV</th>
    <th>DEPARTMENT</th>
    <th>MCPO</th><th>SCPO</th><th>CPO</th><th>PO</th>
    <th>LDG</th><th>AB</th><th>OD</th>
    <th>BORNE</th><th>LEAVE</th><th>TY</th><th>ADMIT</th>
    <th>RUN</th><th>AWAY</th><th>PRESENT</th><th>VICT</th><th>MLR</th>
  </tr>
</thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<script>

/* ================= DATE ================= */
document.getElementById("date").innerText =
  "DATE: " + new Date().toLocaleDateString("en-GB");

/* ================= TABLE LOGIC (FULL ORIGINAL STRUCTURE) ================= */

const COLS = 16;
let data = {};

function inp(id) {
  return `<input type="number" id="${id}" onchange="onInput('${id}', this.value)">`;
}

function onInput(id, val) {
  data[id] = val;
}

function dataRow(divLabel, divRowspan, dept, prefix, rowIdx, isTotalRow, isGrandRow) {

  const cells = Array.from({length: COLS}, (_, c) => {
    const id = `${prefix}_${rowIdx}_${c}`;
    return `<td class="num">${inp(id)}</td>`;
  }).join('');

  const divCell = divLabel
    ? `<td class="div-label" rowspan="${divRowspan}">${divLabel}</td>` : '';

  return `<tr>${divCell}<td class="label">${dept}</td>${cells}</tr>`;
}

/* ================= ORIGINAL DEPARTMENTS (UNCHANGED) ================= */

const summaryDepts = ['BNS PEKUA','COMSUB ORGANIZATIO','TY ATTACH','TOTAL'];

const bnsDepts = [
'SEAMAN','CD','PT','ND','REG','ENGINEERING','ELECTRICAL',
'RADIO ELEC','WRITER','STORE','MEDICAL','MUS','COOK',
'STWARD','TOP','MODC(N)','SWARDS','PROJECT OFFICE',
'BN SCHOOL','BN DREDGER','FIS','TOTAL'
];

const comsubDepts = [
'COMSUB STAFF','COMSUB MSO','COMSUB SECUR','S&S, SO(LAW)',
'CSM(E/R)','CSM(L)','CSM(R)','CSM S & S','CSM(OA)',
'CSM/ DRYDOCK','TRG OFFICE','SUB SCHOOL','SUB SCHOOL TRG',
'FIS','BN DREDGER','TOTAL'
];

const tyDepts = [
'BNS SMJ/PDM/D.Y','FIS','SBP/IK/SIP','PEKUA','BN DREDGER',
'SBP/JJ','SBP/HALDA','SBP/NJ','SBP/PASSUR','QRF (SWADS)',
'TOTAL','GRAND TOTAL'
];

/* ================= BUILD TABLE ================= */

function buildTable() {
  let html = '';

  summaryDepts.forEach((d,i)=>{
    html += dataRow(i===0?'SUMMARY':null, summaryDepts.length, d, 'sum', i);
  });

  html += `<tr><td colspan="18" style="text-align:center;background:gold;font-weight:bold;">BREAK DOWN</td></tr>`;

  bnsDepts.forEach((d,i)=>{
    html += dataRow(i===0?'BNS PEKUA':null, bnsDepts.length, d, 'bns', i);
  });

  comsubDepts.forEach((d,i)=>{
    html += dataRow(i===0?'COMSUB ORGANIZATION':null, comsubDepts.length, d, 'csub', i);
  });

  tyDepts.forEach((d,i)=>{
    html += dataRow(i===0?'TY ATTACH':null, tyDepts.length, d, 'ty', i);
  });

  document.getElementById("tableBody").innerHTML = html;
}

buildTable();

/* ================= CHART JS ================= */

new Chart(document.getElementById("myChart"), {
  type: 'bar',
  data: {
    labels: ["BORN","PRESENT","AWAY","LEAVE","TY","ADMIT","RUN","VICT","MLR"],

    datasets: [{
      label: "COMSUB",

      /* 👉 label যতটা, data ততটাই দিতে হবে */
      data: [12,19,8,15,10,11,7,9,5],

      /* 🎨 সুন্দর gradient-style color palette */
      backgroundColor: [
        "#0f172a",  // deep navy
        "#1e3a8a",
        "#2563eb",
        "#3b82f6",
        "#22c55e",
        "#eab308",
        "#f97316",
        "#ef4444",
        "#8b5cf6"
      ],

      borderRadius: 6,
      borderSkipped: false,

      /* 👉 slim bar control */
      barPercentage: 0.5,
      categoryPercentage: 0.5
    }]
  },

  options: {
    responsive: true,

    plugins: {
      legend: {
        display: true,
        labels: {
          font: {
            size: 12
          }
        }
      }
    },

    scales: {
      x: {
        ticks: {
          font: {
            size: 10
          }
        }
      },
      y: {
        beginAtZero: true,
        ticks: {
          font: {
            size: 10
          }
        }
      }
    }
  }
});

new Chart(document.getElementById("chartId"), {
  type: 'bar',
  data: {
    labels: ["BORN","PRESENT","AWAY","LEAVE","TY","ADMIT","RUN","VICT","MLR"],
    datasets: [{
      label: "SHIPS",

      /* 👉 label যতটা, data ততটাই দিতে হবে */
      data: [10,14,6,20,9,12,8,11,5],

      /* 🎨 different color for each bar */
      backgroundColor: [
        "#1a3a5c",
        "#2c5282",
        "#3182ce",
        "#63b3ed",
        "#68d391",
        "#f6e05e",
        "#ed8936",
        "#fc8181",
        "#9f7aea"
      ],

      borderRadius: 6,   // 👉 bar smooth
      borderSkipped: false,

      /* 👉 bar slim control */
      barPercentage: 0.5,
      categoryPercentage: 0.5
    }]
  },

  options: {
    responsive: true,

    plugins: {
      legend: {
        display: true
      }
    },

    scales: {
      x: {
        ticks: {
          font: {
            size: 10
          }
        }
      },
      y: {
        beginAtZero: true,
        ticks: {
          font: {
            size: 10
          }
        }
      }
    }
  }
});

</script>

</body>
</html>
